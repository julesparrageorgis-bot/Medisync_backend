# Production Profile Configuration
spring.profiles.active=prod

# Database Configuration - Production
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medisync_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate - Optimized for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration - Production
jwt.secret=${JWT_SECRET:change-this-to-a-secure-256-bit-key-in-production}
jwt.expiration=86400000

# File Upload Configuration
file.upload.dir=${FILE_UPLOAD_DIR:/var/medisync/uploads/}
file.upload.max-size=20971520

# Logging Configuration - Production
logging.level.root=WARN
logging.level.ma.medisync=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.file.name=/var/log/medisync/medisync.log
logging.file.max-size=10MB
logging.file.max-history=30

# Email Configuration - Production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger - Disabled in production
springdoc.swagger-ui.enabled=false

# Security - Additional headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
