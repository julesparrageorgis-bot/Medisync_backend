spring.application.name=medisync-backend

# Port du serveur (par défaut 8080)
server.port=8080

# Base de données H2 en mémoire (pour le développement)
spring.datasource.url=jdbc:h2:mem:bibliocampusdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# Console H2 (accessible sur http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA : créer automatiquement les tables depuis les entités
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS : autoriser les requêtes depuis Angular (port 4200)
app.cors.allowed-origins=http://localhost:4200