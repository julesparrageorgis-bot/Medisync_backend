# Persistent local MySQL profile. This is the default profile outside tests.
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medisync_db}?useUnicode=true&characterEncoding=utf8&useSsl=false
spring.datasource.username=${DB_USERNAME:medisync}
spring.datasource.password=${DB_PASSWORD:medisync_dev_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Flyway owns and validates the schema. MariaDB exposes JSON aliases as LONGTEXT through JDBC,
# so Hibernate's type-level schema validation reports false positives for JSON columns.
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/local

logging.level.org.flywaydb=INFO
