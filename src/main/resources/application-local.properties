# Persistent local MySQL profile. This is the default profile outside tests.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medisync_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:medisync}
spring.datasource.password=${DB_PASSWORD:medisync_dev_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway owns the schema; Hibernate checks that entity mappings still match it.
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/local

logging.level.org.flywaydb=INFO
